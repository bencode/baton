# baton back-office — self-contained docker stack (server + web).
#   caddy     — serves the SPA + proxies /api → backend (internal :80, published)
#   backend   — Hono via tsx; entrypoint runs `prisma migrate deploy`; SQLite on a volume
#   web-build — one-shot SPA builder (profile: build); writes the dist into web-dist
# The outer (machine i) caddy reverse-proxies baton.fmap.dev → ${CADDY_HOST_PORT}.
# Worker + DingTalk bridge run elsewhere and connect to https://baton.fmap.dev/api.
services:
  caddy:
    image: caddy:2.10-alpine
    ports:
      - "${CADDY_HOST_PORT}:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - web-dist:/srv/web:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
    restart: unless-stopped

  web-build:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web-build
    volumes:
      - web-dist:/output
    restart: "no"
    profiles: ["build"]

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    env_file: .env
    volumes:
      - baton_data:/data
    expose:
      - "3280"
    restart: unless-stopped

  # DingTalk → baton bridge. Talks to the backend over the internal network
  # (BATON_SERVER=http://backend:3280); deep links use the public BATON_WEB_BASE.
  bridge:
    build:
      context: ..
      dockerfile: docker/Dockerfile.bridge
    env_file: .env
    # The user→session binding map must outlive container rebuilds — without a
    # volume every redeploy wiped it, so each user's next message spawned a fresh
    # session instead of reusing their still-active one. Persist it on a volume.
    environment:
      - BATON_DINGTALK_BINDINGS=/data/dingtalk-bindings.json
    volumes:
      - bridge_data:/data
    depends_on:
      - backend
    restart: unless-stopped

  # Feishu (Lark) → baton bridge. Same shape as `bridge`; routes to its own
  # (project, worker) via `environment` (overrides .env, which the DingTalk
  # bridge uses for its route). FEISHU_APP_ID/SECRET + BATON_TOKEN live in .env.
  feishu:
    build:
      context: ..
      dockerfile: docker/Dockerfile.feishu
    env_file: .env
    environment:
      - BATON_PROJECT_ID=3
      - BATON_WORKER_ID=4
      - BATON_FEISHU_BINDINGS=/data/feishu-bindings.json
    volumes:
      - feishu_data:/data
    depends_on:
      - backend
    restart: unless-stopped

  # Second Feishu bridge — the personal/general account → the rooma worker.
  # Same image as `feishu`; its own app creds (FEISHU2_* in .env) and its own
  # bindings volume so the two apps never share user→session state.
  feishu2:
    build:
      context: ..
      dockerfile: docker/Dockerfile.feishu
    env_file: .env
    environment:
      - FEISHU_APP_ID=${FEISHU2_APP_ID}
      - FEISHU_APP_SECRET=${FEISHU2_APP_SECRET}
      - BATON_PROJECT_ID=4
      - BATON_WORKER_ID=3
      - BATON_FEISHU_BINDINGS=/data/feishu-bindings.json
    volumes:
      - feishu2_data:/data
    depends_on:
      - backend
    restart: unless-stopped

  # Third Feishu bridge — the Goat project (考研复习) → its macmini worker.
  # Same image as `feishu`; its own app creds (FEISHU3_* in .env) and its own
  # bindings volume so it never shares user→session state with the others.
  feishu3:
    build:
      context: ..
      dockerfile: docker/Dockerfile.feishu
    env_file: .env
    environment:
      - FEISHU_APP_ID=${FEISHU3_APP_ID}
      - FEISHU_APP_SECRET=${FEISHU3_APP_SECRET}
      - BATON_PROJECT_ID=11
      - BATON_WORKER_ID=14
      - BATON_FEISHU_BINDINGS=/data/feishu-bindings.json
    volumes:
      - feishu3_data:/data
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  web-dist:
  caddy_data:
  caddy_config:
  baton_data:
  bridge_data:
  feishu_data:
  feishu2_data:
  feishu3_data:
