name: baton-worker

services:
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: baton-worker
    restart: unless-stopped
    working_dir: /repo
    # All runtime config (baton wiring + claude auth) comes from .env.
    env_file: .env
    volumes:
      # The repo the agent works in. cwd=/repo; worktrees branch off /repo/.git.
      - ${BATON_REPO_DIR:?set BATON_REPO_DIR in .env}:/repo
      # machineId (idempotent register) + worktrees.
      - baton_state:/home/baton/.local/share/baton
      # claude session state / settings (resume needs this to persist).
      - claude_home:/home/baton/.claude
      # Host-managed skills, surfaced inside as user-level skills (install/edit
      # outside → live inside, no rebuild, every session). Read-only so the
      # agent can't alter them. ./skills is relative to this compose file.
      - ./skills:/home/baton/.claude/skills:ro
      # Host-provided CLI a skill shells out to (a self-contained script — no
      # npm install). Single-file bind onto PATH; reachable as a command inside.
      # - ./bin/tcollab-bridge:/usr/local/bin/tcollab-bridge:ro
      # Read-only reference repos the agent can read but not modify. Pair with
      # permissions.additionalDirectories in ~/.claude/settings.json (e.g.
      # ["/resources/engine-shell"]) so claude treats them as workspace roots.
      # The host dir also needs a colima read-only mount: `--mount <dir>:r`.
      # - /Users/you/baton-resources:/resources:ro
      # Uncomment to let the agent `git push` (credential.helper store reads a
      # `credentials` file inside this directory). Directory mount, not a single
      # file — a file bind pins an inode and breaks git's atomic rewrite.
      # - ${BATON_REPO_DIR}/.gitcfg:/home/baton/.gitcfg

volumes:
  baton_state:
  claude_home:
