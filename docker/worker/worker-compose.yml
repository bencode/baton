# Project name (and thus the named-volume prefix + container names) defaults to
# `baton-worker`. To run a SECOND worker from this same repo dir, copy this dir
# and set COMPOSE_PROJECT_NAME in that .env (e.g. baton-worker-pro) — it gets its
# own baton_state volume (→ distinct machineId → distinct worker) and its own
# container names. Pair it with BATON_WORKER_CONFIG in .env (translated to the
# CLI's --config flag by entrypoint.sh) so the two daemons own distinct
# .baton.json identity files even though cwd=/repo is shared.
name: baton-worker

services:
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    working_dir: /repo
    # All runtime config (baton wiring + agent auth) comes from .env.
    env_file: .env
    volumes:
      # The repo the agent works in. cwd=/repo; worktrees branch off /repo/.git.
      - ${BATON_REPO_DIR:?set BATON_REPO_DIR in .env}:/repo
      # machineId (idempotent register) + worktrees.
      - baton_state:/home/baton/.local/share/baton
      # claude session state / settings (resume needs this to persist).
      - claude_home:/home/baton/.claude
      # codex auth/session state (ChatGPT login + ~/.codex/sessions).
      - codex_home:/home/baton/.codex
      # Host-managed skills, surfaced inside as user-level skills (install/edit
      # outside → live inside, no rebuild, every session). Read-only so the
      # agent can't alter them. ./skills is relative to this compose file.
      - ./skills:/home/baton/.claude/skills:ro
      # Host-provided CLI a skill shells out to (a self-contained script — no
      # npm install). Single-file bind onto PATH; reachable as a command inside.
      # - ./bin/tcollab-bridge:/usr/local/bin/tcollab-bridge:ro
      # Read-only reference repos the agent can read but not modify (real source
      # to grep when asked "how is X wired"). Mount them, then set BATON_ADD_DIRS
      # in .env to the same absolute paths (colon-separated) — the runner passes
      # them as the SDK's --add-dir so claude treats them as workspace roots.
      # (settings.json permissions.additionalDirectories is NOT enough under
      # bypassPermissions.) The host dir also needs a colima read-only mount:
      # `--mount <dir>:r`. e.g. in .env: BATON_ADD_DIRS=/resources/engine-shell
      # - /Users/you/baton-resources:/resources:ro
      # Uncomment to drive claude through reclaude (built with INSTALL_RECLAUDE=1):
      # a named volume holds the device login + reclaude's claude cache. Pair with
      # BATON_CLAUDE_BIN in .env. See README "claude via reclaude (baked into the
      # image)". (declare `reclaude_state` under top-level volumes:)
      # - reclaude_state:/home/baton/.reclaude
      # Uncomment to let the agent `git push` (credential.helper store reads a
      # `credentials` file inside this directory). Directory mount, not a single
      # file — a file bind pins an inode and breaks git's atomic rewrite.
      # - ${BATON_REPO_DIR}/.gitcfg:/home/baton/.gitcfg

volumes:
  baton_state:
  claude_home:
  codex_home:
